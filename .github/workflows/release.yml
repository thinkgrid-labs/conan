name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────────────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: conan-linux-x86_64
            exe: conan
            archive: tar

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: conan-linux-aarch64
            exe: conan
            archive: tar
            cross: true

          # ── macOS ──────────────────────────────────────────────────────────
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: conan-macos-x86_64
            exe: conan
            archive: tar

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: conan-macos-aarch64
            exe: conan
            archive: tar

          # ── Windows ────────────────────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: conan-windows-x86_64
            exe: conan.exe
            archive: zip

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact: conan-windows-aarch64
            exe: conan.exe
            archive: zip

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2.7.8

      # cross-compilation for Linux ARM64
      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package (Unix) ────────────────────────────────────────────────────
      - name: Package (tar.gz)
        if: matrix.archive == 'tar'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.exe }} ${{ matrix.artifact }}
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      # ── Package (Windows) ─────────────────────────────────────────────────
      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.exe }}" "${{ matrix.artifact }}.exe"
          Compress-Archive -Path "${{ matrix.artifact }}.exe" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact (tar.gz)
        if: matrix.archive == 'tar'
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

      - name: Upload artifact (zip)
        if: matrix.archive == 'zip'
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4.3.0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.2.2
        with:
          files: |
            **/*.tar.gz
            **/*.zip
          generate_release_notes: true
