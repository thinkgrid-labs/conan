version = "1.0"
# Default action when no rule and no threshold matches: "allow" | "warn" | "block"
mode = "warn"

# ─── Score thresholds (applied after rules, before falling back to mode) ──────
#
# If no rule matches, these kick in based on the computed risk score (0–100).
# block is checked before warn.

[thresholds]
# Auto-block anything that reaches Critical band (score >= 76).
block = 90
# Auto-warn anything that reaches High band (score >= 51).
warn = 60

# ─── Rules (evaluated top-to-bottom, first match wins) ────────────────────────
#
# New fields:
#   min_score     — rule only fires if the computed score is >= this value
#   score_override — when this rule matches, pin the finding's score to this value

[[rules]]
id = "allow-local-models"
description = "Local models (ollama, localai) are always allowed."
trigger = "ai_detected"
tags = ["local"]
action = "allow"

[[rules]]
id = "block-dlp-critical"
description = "Block any finding where a critical secret is detected. Escalate score to 95."
trigger = "dlp_match"
score_override = 95
action = "block"
notify = ["slack"]

[[rules]]
id = "block-critical-score"
description = "Block anything that already scores Critical (>= 76), regardless of service."
trigger = "any"
min_score = 76
action = "block"

[[rules]]
id = "warn-unapproved-cloud-ai"
description = "Warn when any unapproved cloud AI service is used."
trigger = "ai_detected"
# Add your approved service IDs here to suppress warnings for them:
# exclude_ids = ["openai", "anthropic"]
action = "warn"

# ─── Notification channels ────────────────────────────────────────────────────

[notifications.slack]
# Set via env var: CONAN_SLACK_WEBHOOK
webhook_url = "${CONAN_SLACK_WEBHOOK}"

[notifications.discord]
# Set via env var: CONAN_DISCORD_WEBHOOK
webhook_url = "${CONAN_DISCORD_WEBHOOK}"
