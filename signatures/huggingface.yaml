id: huggingface
name: Hugging Face
version: "1.0.0"
risk_base: 50
privacy_policy_url: "https://huggingface.co/privacy"
domains:
  - api-inference.huggingface.co
  - huggingface.co
  - hf.co
process_names:
  - huggingface-cli
  - transformers
http_patterns:
  user_agents:
    - transformers
    - huggingface_hub
dlp_patterns:
  - id: huggingface_key
    pattern: "hf_[A-Za-z0-9]{20,}"
    severity: critical
tags: [llm, cloud, open-source, models]
