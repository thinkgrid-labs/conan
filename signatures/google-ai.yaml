id: google-ai
name: Google AI (Gemini / Vertex)
version: "1.0.0"
risk_base: 60
privacy_policy_url: "https://policies.google.com/privacy"
domains:
  - generativelanguage.googleapis.com
  - aiplatform.googleapis.com
  - gemini.google.com
  - aistudio.google.com
process_names:
  - gemini
