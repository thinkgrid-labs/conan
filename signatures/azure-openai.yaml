id: azure-openai
name: Azure OpenAI Service
version: "1.0.0"
risk_base: 55
privacy_policy_url: "https://privacy.microsoft.com/en-us/privacystatement"
domains:
  - openai.azure.com
  - cognitiveservices.azure.com
process_names: []
http_patterns:
  user_agents:
    - openai-python
    - openai-node
dlp_patterns:
  - id: azure_openai_key
    pattern: "[0-9a-f]{32}"
    severity: high
tags: [llm, cloud, paid, azure, microsoft]
